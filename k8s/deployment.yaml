apiVersion: apps/v1
kind: Deployment
metadata:
  name: investment-api
  namespace: investment
  labels:
    app: investment-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: investment-api
  template:
    metadata:
      labels:
        app: investment-api
    spec:
      serviceAccountName: investment-api-sa
      containers:
        - name: api
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/investment-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: investment-api-secrets
            - configMapRef:
                name: investment-api-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
