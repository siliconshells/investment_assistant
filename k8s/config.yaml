apiVersion: v1
kind: Namespace
metadata:
  name: investment
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: investment-api-sa
  namespace: investment
  annotations:
    # IAM Role for Service Account (IRSA) — populated by Terraform
    eks.amazonaws.com/role-arn: ${IAM_ROLE_ARN}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: investment-api-config
  namespace: investment
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "investment-assistant-data"
  LLM_PROVIDER: "anthropic"
---
# Secrets — apply separately, never commit real values
apiVersion: v1
kind: Secret
metadata:
  name: investment-api-secrets
  namespace: investment
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_VIA_CI_OR_SECRETS_MANAGER"
  OPENAI_API_KEY: "REPLACE_VIA_CI_OR_SECRETS_MANAGER"
  ALPHA_VANTAGE_API_KEY: "REPLACE_VIA_CI_OR_SECRETS_MANAGER"
