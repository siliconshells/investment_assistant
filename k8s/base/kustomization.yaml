apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: investment

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  # Secrets are NOT included here — apply manually or via CI.
  # See secrets.template.yaml for instructions.

labels:
  - pairs:
      project: investment-assistant
    includeSelectors: true
