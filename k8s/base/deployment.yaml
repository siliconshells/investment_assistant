apiVersion: apps/v1
kind: Deployment
metadata:
  name: investment-api
  namespace: investment
  labels:
    app: investment-api
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: investment-api
  template:
    metadata:
      labels:
        app: investment-api
    spec:
      serviceAccountName: investment-api-sa
      containers:
        - name: api
          image: 620173787208.dkr.ecr.us-east-1.amazonaws.com/investment-assistant-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: investment-api-config
            - secretRef:
                name: investment-api-secrets
          env:
            - name: AWS_ROLE_ARN
              value: "arn:aws:iam::620173787208:role/eks-investment-s3"
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow
            - name: aws-iam-token
              mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
              readOnly: true      
      volumes:
        - name: aws-iam-token
          projected:
            defaultMode: 420
            sources:
            - serviceAccountToken:
                audience: sts.amazonaws.com
                expirationSeconds: 86400
                path: token
        - name: airflow-data
          emptyDir: {} # This keeps data alive as long as the pod is scheduled on the node