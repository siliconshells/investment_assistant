# ============================================================
# SECRET TEMPLATE — do NOT commit real values to version control
# ============================================================
#
# Create the secret manually before deploying:
#
#   kubectl create secret generic investment-api-secrets \
#     --namespace=investment \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=OPENAI_API_KEY=sk-... \
#     --from-literal=ALPHA_VANTAGE_API_KEY=...
#
# Or copy this file, fill in real values, and apply:
#
#   cp secrets.template.yaml secrets.yaml  # (secrets.yaml is gitignored)
#   kubectl apply -f secrets.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: investment-api-secrets
  namespace: investment
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  OPENAI_API_KEY: "REPLACE_ME"
  ALPHA_VANTAGE_API_KEY: "REPLACE_ME"
