apiVersion: v1
kind: Service
metadata:
  name: investment-api
  namespace: investment
spec:
  type: ClusterIP
  selector:
    app: investment-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: investment-api-ingress
  namespace: investment
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal  # internal-only for research teams
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: investment-api
                port:
                  number: 80
